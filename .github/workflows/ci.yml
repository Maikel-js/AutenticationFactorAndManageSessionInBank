name: ci

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm --workspace @fintechshield/web run lint
      - run: npm --workspace @fintechshield/web run typecheck
      - run: npm --workspace @fintechshield/web run build

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore AutenticationFactorAndManageSessionInBank.sln --configfile NuGet.Config
      - run: dotnet build AutenticationFactorAndManageSessionInBank.sln --no-restore -c Release

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript,csharp
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
