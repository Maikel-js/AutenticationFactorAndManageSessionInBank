name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - "AutenticationFactorAndManageSessionInBank.Api/**"
      - "AutenticationFactorAndManageSessionInBank.Application/**"
      - "AutenticationFactorAndManageSessionInBank.Domain/**"
      - "AutenticationFactorAndManageSessionInBank.Infrastructure/**"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore AutenticationFactorAndManageSessionInBank.sln --configfile NuGet.Config
      - run: dotnet publish AutenticationFactorAndManageSessionInBank.Api/AutenticationFactorAndManageSessionInBank.Api.csproj -c Release -o out
      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: out
